# Upsun configuration, generated using AI at: 2026-04-27T14:00:13Z
# AI can make mistakes. Please modify this file to suit your needs.
applications:
  website:
    source:
      root: apps/website
    type: nodejs:24
    build:
      flavor: none
    hooks:
      build: |
        mkdir -p $HOME/.local/bin
        corepack enable --install-directory $HOME/.local/bin
        export PATH="$HOME/.local/bin:$PATH"
        corepack prepare yarn@4.12.0 --activate
        yarn install --immutable
        yarn build
    web:
      commands:
        start: yarn start
      locations:
        /:
          root: build
          index: [index.html]
          scripts: false
          expires: 24h
          rules:
            '\.(css|js|gif|jpe?g|png|svg|webp)$':
              expires: 4w
    relationships:
      db: {}

services:
  db:
    type: postgresql:18

routes:
  https://{default}/:
    type: upstream
    upstream: website:http
