name: Download translations

on:
  schedule:
    - cron: 15 4 * * *

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch slug to download translations from (exports main + branch keys)"
        required: false
        type: string

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - run: corepack enable

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - run: yarn install

      - name: Download translations
        env:
          TRANSI_STORE_API_KEY: ${{ secrets.TRANSI_STORE_API_KEY }}
        run: yarn turbo run download-translations${{ inputs.branch && format(' -- --branch {0}', inputs.branch) || '' }}

      - uses: EndBug/add-and-commit@v9 # You can change this to use a specific version.
        with:
          # The arguments for the `git add` command (see the paragraph below for more info)
          # Default: '.'
          add: "apps/website/app/locales/"

          # Determines the way the action fills missing author name and email. Three options are available:
          # - github_actor -> UserName <UserName@users.noreply.github.com>
          # - user_info -> Your Display Name <your-actual@email.com>
          # - github_actions -> github-actions <email associated with the github logo>
          # Default: github_actor
          default_author: github_actions

          # The message for the commit.
          # Default: 'Commit from GitHub Actions (name of the workflow)'
          message: "Download new translations"

          # The way the action should handle pathspec errors from the add and remove commands. Three options are available:
          # - ignore -> errors will be logged but the step won't fail
          # - exitImmediately -> the action will stop right away, and the step will fail
          # - exitAtEnd -> the action will go on, every pathspec error will be logged at the end, the step will fail.
          # Default: ignore
          pathspec_error_handling: ignore
